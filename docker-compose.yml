services:

  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap
    environment:
      LDAP_ORGANISATION: "MyOrg"
      LDAP_DOMAIN: "myorg.local"
      LDAP_ADMIN_PASSWORD: admin
      LDAP_TLS: "false"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  backend:
    build: ./demoLdap
    container_name: demoLdap
    ports:
      - "8081:8081"
    depends_on:
      - ldap
    environment:
      SPRING_LDAP_URLS: ldap://ldap:389
      SPRING_LDAP_BASE: dc=myorg,dc=local
      SPRING_LDAP_USERNAME: cn=admin,dc=myorg,dc=local
      SPRING_LDAP_PASSWORD: admin

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  ldap_data:
  ldap_config:
