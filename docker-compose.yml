services:

  ldap:
    image: openmicroscopy/apacheds:latest
    container_name: ldap
    ports:
      - "10389:10389"
      - "10636:10636"
    volumes:
      - ldap_data:/var/lib/apacheds
      - ./ldap:/ldap-data

  ldap-init:
    image: osixia/openldap:1.5.0
    container_name: ldap-init
    depends_on:
      - ldap
    volumes:
      - ./ldap:/ldap-data
    entrypoint: >
      sh -c "
      sleep 20 &&
      ldapadd
      -x
      -H ldap://ldap:10389
      -D 'uid=admin,ou=system'
      -w secret
      -f /ldap-data/sorted_export.ldif
      "

  backend:
    build: ./demoLdap
    container_name: demoLdap
    ports:
      - "8081:8080"
    depends_on:
      - ldap
    environment:
      SPRING_LDAP_URLS: ldap://ldap:10389
      SPRING_LDAP_BASE: dc=example,dc=com
      SPRING_LDAP_USERNAME: uid=admin,ou=system
      SPRING_LDAP_PASSWORD: secret

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend


volumes:
  ldap_data: